name: Deploy Backend Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: functions
        run: npm run build

      - name: Setup Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/sa-key.json" >> $GITHUB_ENV

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Deploy Functions
        run: firebase deploy --only functions --project rota-31---backend --non-interactive --force

      - name: Verify deploy
        run: |
          # Health check no endpoint deployado
          for i in {1..6}; do
            if curl -sSf -o /dev/null https://api-ajc3rclwsa-rj.a.run.app/api/health; then
              echo "✅ Backend respondendo"
              exit 0
            fi
            echo "⏳ Tentativa $i/6 — aguardando 10s..."
            sleep 10
          done
          echo "❌ Backend não responde após deploy"
          exit 1

      - name: Cleanup
        if: always()
        run: rm -f $HOME/sa-key.json
